<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electronic Queue</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .card-soft { border: 0; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.06); }
    .badge-soft { font-weight: 600; }
    .table td, .table th { vertical-align: middle; }
  </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand fw-semibold"
       href="{% if user and user.role == 'admin' %}/admin{% else %}/{% endif %}">
      Electronic Queue
    </a>

    <div class="ms-auto d-flex align-items-center gap-2">

      {% if user %}

        {% if user.role == "user" %}
          <a class="btn btn-outline-light btn-sm" href="/">Головна</a>
          <a class="btn btn-outline-light btn-sm" href="/my/tickets">Мої записи</a>

        {% elif user.role == "admin" %}
          <a class="btn btn-outline-light btn-sm" href="/admin">Адмін</a>
          <a class="btn btn-outline-light btn-sm" href="/admin/services">Послуги</a>
          <a class="btn btn-outline-light btn-sm" href="/admin/tickets">Черга</a>
        {% endif %}

        <form method="post" action="/logout" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-warning btn-sm">Logout</button>
        </form>

      {% else %}

        <a class="btn btn-outline-light btn-sm" href="/login">Login</a>

      {% endif %}

    </div>

  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
